    <progress class="progress" id="adhd_progress" value="00" max="100"></progress>
    <script>
        const interval = setInterval(calculateProgress, 5000);

        function calculateProgress() {
            const progressBar = document.getElementById('adhd_progress');
            const start = new Date('2026-03-25T00:00:00');
            const end   = new Date('2026-04-01T00:00:00');
            const now   = new Date();

            if (now <= start){
                progressBar.value = 0; 
                return
            }
            if (now >= end){ 
                progressBar.value = 100;
                return
            }

            const elapsed = now - start;
            const total   = end - start;

            progressBar.value =  (elapsed / total) * 100;
    }
    
    calculateProgress();
    </script>
